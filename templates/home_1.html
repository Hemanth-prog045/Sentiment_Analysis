<!DOCTYPE html>
<html>
<head>
    <title>HOME</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh">

    {% if role == 'admin' %}
    <!-- ADMIN -->
    
    <div class="card" style="width: 18rem;">
        <img src="{{ url_for('static', filename='img/admin-default.png') }}" class="card-img-top">
        <div class="card-body text-center">
            <h5 class="card-title">{{ name }}</h5>
            <a href="{{ url_for('logout') }}" class="btn btn-dark">Logout</a>
        </div>
    </div>

    <div class="p-3">
        {% if members %}
        <h1 class="display-4 fs-1">Members</h1>
        
        <table class="table" style="width: 32rem;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>User name</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody>
                {% for row in members %}
                <tr>
                    <th>{{ loop.index }}</th>
                    <td>{{ row['name'] }}</td>
                    <td>{{ row['username'] }}</td>
                    <td>{{ row['role'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% endif %}
    </div>

    {% else %}
    <!-- USER -->
    
    <div class="card" style="width: 18rem;">
        <img src="{{ url_for('static', filename='img/user-default.png') }}" class="card-img-top">
        <div class="card-body text-center">
            <h5 class="card-title">{{ name }}</h5>
            <a href="{{ url_for('logout') }}" class="btn btn-dark">Logout</a>
        </div>
    </div>

    {% endif %}

</div>

</body>
</html>
